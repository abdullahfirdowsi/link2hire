<div class="flex flex-col h-screen bg-gradient-to-br from-gray-50 to-gray-100">
  <!-- Header -->
  <header class="bg-white shadow-md border-b border-gray-200">
    <div class="container mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold text-gray-800">Link2Hire</h1>
          <p class="text-xs text-gray-500">AI-Powered Job Processing</p>
        </div>
      </div>
      <button
        (click)="clearChat()"
        class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        Clear Chat
      </button>
    </div>
  </header>

  <!-- Chat Container -->
  <div 
    #chatContainer
    class="flex-1 overflow-y-auto px-4 py-6 space-y-4 container mx-auto max-w-4xl">
    
    <!-- Messages -->
    <div *ngFor="let message of messages" 
         [ngClass]="message.type === 'user' ? 'flex justify-end' : 'flex justify-start'">
      
      <!-- Bot Message -->
      <div *ngIf="message.type === 'bot'" class="flex items-start space-x-3 max-w-3xl">
        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <div class="flex-1">
          <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
            <!-- Loading State -->
            <div *ngIf="message.isLoading" class="flex items-center space-x-2">
              <div class="animate-bounce w-2 h-2 bg-blue-600 rounded-full"></div>
              <div class="animate-bounce w-2 h-2 bg-blue-600 rounded-full" style="animation-delay: 0.2s"></div>
              <div class="animate-bounce w-2 h-2 bg-blue-600 rounded-full" style="animation-delay: 0.4s"></div>
              <span class="text-sm text-gray-600 ml-2">{{ message.content }}</span>
            </div>
            
            <!-- Regular Message -->
            <div *ngIf="!message.isLoading" class="prose prose-sm max-w-none">
              <p class="text-gray-800 whitespace-pre-wrap">{{ message.content }}</p>
            </div>

            <!-- LinkedIn Post Display -->
            <div *ngIf="message.linkedInPost" class="mt-4 border-t border-gray-200 pt-4">
              <div class="bg-gray-50 rounded-lg p-4 border border-gray-200">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-xs font-semibold text-gray-700 uppercase">LinkedIn Post</span>
                  <button 
                    (click)="copyToClipboard(message.linkedInPost.post_text)"
                    class="text-xs text-blue-600 hover:text-blue-800 font-medium">
                    Copy
                  </button>
                </div>
                <p class="text-sm text-gray-700 whitespace-pre-wrap mb-3">{{ message.linkedInPost.post_text }}</p>
                <div class="flex flex-wrap gap-2">
                  <span *ngFor="let tag of message.linkedInPost.hashtags"
                        class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                    #{{ tag }}
                  </span>
                </div>
              </div>
            </div>

            <!-- Clarification Buttons -->
            <div *ngIf="message.requiresClarification && awaitingClarification" 
                 class="mt-4 flex space-x-3">
              <button
                (click)="onClarificationChoice('combined')"
                [disabled]="isProcessing"
                class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 transition-colors font-medium text-sm">
                Combined Entry
              </button>
              <button
                (click)="onClarificationChoice('separate')"
                [disabled]="isProcessing"
                class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50 transition-colors font-medium text-sm">
                Separate Entries
              </button>
            </div>
          </div>
          <span class="text-xs text-gray-400 mt-1 block">{{ message.timestamp | date:'short' }}</span>
        </div>
      </div>

      <!-- User Message -->
      <div *ngIf="message.type === 'user'" class="flex items-start space-x-3 max-w-3xl">
        <div class="flex-1">
          <div class="bg-blue-600 text-white rounded-lg shadow-sm p-4">
            <p class="text-sm whitespace-pre-wrap">{{ message.content }}</p>
          </div>
          <span class="text-xs text-gray-400 mt-1 block text-right">{{ message.timestamp | date:'short' }}</span>
        </div>
        <div class="w-8 h-8 rounded-full bg-gray-600 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="bg-white border-t border-gray-200 shadow-lg">
    <div class="container mx-auto max-w-4xl px-4 py-4">
      <form (ngSubmit)="onSubmit()" class="flex items-end space-x-3">
        <div class="flex-1">
          <textarea
            #messageInput
            [(ngModel)]="userInput"
            name="userInput"
            (input)="onInputChange()"
            (keydown)="onKeyDown($event)"
            [disabled]="isProcessing"
            placeholder="Paste your job posting here..."
            rows="1"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none disabled:opacity-50 disabled:cursor-not-allowed transition-all"
            style="max-height: 200px; overflow-y: auto;">
          </textarea>
          <p class="text-xs text-gray-500 mt-1">
            Press Enter to send, Shift+Enter for new line
          </p>
        </div>
        <button
          type="submit"
          [disabled]="!userInput.trim() || isProcessing"
          class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors font-medium flex items-center space-x-2">
          <svg *ngIf="!isProcessing" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
          <svg *ngIf="isProcessing" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" 
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          <span>{{ isProcessing ? 'Processing...' : 'Send' }}</span>
        </button>
      </form>
    </div>
  </div>
</div>
